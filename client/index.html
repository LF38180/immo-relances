<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>ImmoRelances — Le Quai de l'Immobilier</title>
  <meta name="description" content="Gestion des relances commerciales — Le Quai de l'Immobilier" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Theme color (barre de statut mobile) -->
  <meta name="theme-color" content="#0D0D2B" />
  <meta name="msapplication-TileColor" content="#0D0D2B" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ImmoRelances" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('PWA prête'))
          .catch(err => console.log('SW erreur:', err));
      });
    }
  </script>
</body>
</html>
